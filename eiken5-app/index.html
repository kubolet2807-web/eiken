<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>英検5級 学習アプリ</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="loading" id="loading">
    <div class="loading-box">
      <div class="loader"></div>
      <p>学習データを準備中...</p>
    </div>
  </div>

  <div class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">EIKEN GRADE 5</p>
        <h1>英検5級 学習アプリ</h1>
      </div>
      <button class="ghost-button" id="resetButton" type="button">記録リセット</button>
    </header>

    <main>
      <section class="screen active" id="homeScreen" aria-labelledby="homeTitle">
        <div class="hero-panel">
          <div>
            <p class="eyebrow">今日の学習</p>
            <h2 id="homeTitle">まずは10問、合格に近づこう</h2>
            <p class="lead">単語、文法、会話、ミニ模試からバランスよく出題します。</p>
          </div>
          <div class="hero-actions">
            <button class="primary-button" id="startDailyButton" type="button">今日の10問を始める</button>
            <button class="secondary-button" id="openVocabButton" type="button">単語一覧を見る</button>
          </div>
        </div>

        <div class="stats-grid" aria-label="学習記録">
          <article class="stat-card">
            <span>総解答数</span>
            <strong id="totalAnswered">0</strong>
          </article>
          <article class="stat-card">
            <span>正答率</span>
            <strong id="accuracyRate">0%</strong>
          </article>
          <article class="stat-card">
            <span>今日の学習</span>
            <strong id="todayAnswered">0問</strong>
          </article>
          <article class="stat-card">
            <span>復習待ち</span>
            <strong id="reviewCount">0問</strong>
          </article>
        </div>

        <section class="content-section" aria-labelledby="categoryTitle">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Practice</p>
              <h2 id="categoryTitle">カテゴリ練習</h2>
            </div>
          </div>
          <div class="category-grid" id="categoryGrid"></div>
        </section>
      </section>

      <section class="screen" id="quizScreen" aria-labelledby="quizTitle">
        <div class="quiz-topbar">
          <button class="ghost-button" id="backHomeButton" type="button">ホームへ</button>
          <div class="progress-wrap" aria-label="進捗">
            <div class="progress-label">
              <span id="quizTitle">練習</span>
              <span id="questionCounter">1 / 10</span>
            </div>
            <div class="progress-track">
              <div class="progress-bar" id="progressBar"></div>
            </div>
          </div>
        </div>

        <article class="question-panel">
          <p class="question-type" id="questionType">単語</p>
          <h2 id="questionText">Question</h2>
          <div class="reading-row">
            <p class="reading-text" id="readingText">読み方</p>
            <button class="sound-button" id="speakButton" type="button" aria-label="英語を聞く">聞く</button>
          </div>
          <div class="choices" id="choices"></div>
          <div class="feedback" id="feedback" aria-live="polite"></div>
          <button class="primary-button hidden" id="nextButton" type="button">次の問題へ</button>
        </article>
      </section>

      <section class="screen" id="vocabScreen" aria-labelledby="vocabTitle">
        <div class="quiz-topbar">
          <button class="ghost-button" id="vocabHomeButton" type="button">ホームへ</button>
          <div>
            <p class="eyebrow">Vocabulary</p>
            <h2 id="vocabTitle">英検5級 重要単語一覧</h2>
          </div>
        </div>

        <section class="vocab-panel">
          <div class="vocab-toolbar">
            <label class="field-label">
              検索
              <input id="vocabSearch" type="search" placeholder="英単語・読み方・意味で検索">
            </label>
            <label class="field-label">
              カテゴリ
              <select id="vocabGroupFilter"></select>
            </label>
          </div>
          <p class="vocab-count" id="vocabCount">0語</p>
          <div class="vocab-list" id="vocabList"></div>
        </section>
      </section>

      <section class="screen" id="resultScreen" aria-labelledby="resultTitle">
        <article class="result-panel">
          <p class="eyebrow">Result</p>
          <h2 id="resultTitle">結果</h2>
          <p class="result-score" id="resultScore">0 / 0</p>
          <p class="lead" id="resultMessage">おつかれさまでした。</p>
          <div class="mistake-list" id="mistakeList"></div>
          <div class="button-row">
            <button class="primary-button" id="retryButton" type="button">もう一度</button>
            <button class="secondary-button" id="reviewButton" type="button">復習する</button>
            <button class="ghost-button" id="resultHomeButton" type="button">ホームへ</button>
          </div>
        </article>
      </section>
    </main>
  </div>

  <script src="questions.js"></script>
  <script src="vocabulary.js"></script>
  <script src="app.js"></script>
</body>
</html>
